databases:
  - name: must-academic-db
    plan: basic-256mb
    databaseName: must_academic
    user: must_academic

services:
  - type: web
    name: must-odoo-academic-tracker
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: must-academic-db
          property: connectionString
